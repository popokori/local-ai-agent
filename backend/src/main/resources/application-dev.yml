spring:
  jpa:
    properties:
      hibernate.format_sql: true
  flyway:
    clean-disabled: false

logging:
  level:
    mr.popo.localaiagent: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.web: DEBUG

app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost:5173,http://localhost:3000
  # En dev, les endpoints /llm/** sont ouverts à tout utilisateur authentifié
  # (par défaut ADMIN en prod). Voir SecurityConfig.
